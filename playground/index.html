<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Gateway — Playground</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--bg4:#242442;--border:#2a2a4a;--text:#e0e0f0;--text2:#8888aa;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#ff6b6b;--orange:#fdcb6e;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.4)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .badge{font-size:10px;background:var(--accent);color:white;padding:2px 8px;border-radius:20px;font-weight:600}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* Controls */
.controls{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-group label{font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
select,input[type=text],input[type=password]{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:13px;outline:none;transition:border-color 0.2s}
select:focus,input:focus{border-color:var(--accent)}
select{cursor:pointer;min-width:140px}
input[type=password]{width:200px;font-family:monospace;font-size:12px}
.toggle-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all 0.2s}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:white}
.toggle-btn:hover{border-color:var(--accent)}

/* Status dot */
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background 0.3s}
.status-dot.connected{background:var(--green);box-shadow:0 0 8px var(--green)}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Messages */
.msg{display:flex;gap:12px;max-width:85%;animation:fadeIn 0.3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--accent),#8b5cf6)}
.msg.assistant .msg-avatar{background:linear-gradient(135deg,var(--green),#00cec9)}

.msg-body{display:flex;flex-direction:column;gap:4px}
.msg-content{padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg.user .msg-content{background:var(--accent);color:white;border-bottom-right-radius:4px}
.msg.assistant .msg-content{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-meta{font-size:11px;color:var(--text2);padding:0 4px;display:flex;gap:8px}
.msg.user .msg-meta{justify-content:flex-end}

/* Code blocks */
.msg-content code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-family:'Fira Code',monospace;font-size:13px}
.msg-content pre{background:rgba(0,0,0,0.4);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.msg-content pre code{background:none;padding:0}

/* Typing indicator */
.typing{display:none;align-self:flex-start;padding:8px 16px}
.typing.visible{display:flex}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent2);animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* Input area */
.input-area{background:var(--bg2);border-top:1px solid var(--border);padding:16px 20px;flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-wrapper{flex:1;position:relative}
textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--radius);font-size:14px;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:200px;line-height:1.5;transition:border-color 0.2s}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--text2)}
.send-btn{width:48px;height:48px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),#8b5cf6);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(108,92,231,0.4)}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.stop-btn{background:linear-gradient(135deg,var(--red),#e17055)!important}

/* Welcome */
.welcome{text-align:center;padding:60px 20px;color:var(--text2)}
.welcome h2{font-size:24px;color:var(--text);margin-bottom:8px}
.welcome p{font-size:14px;max-width:400px;margin:0 auto;line-height:1.6}
.welcome .examples{display:flex;flex-direction:column;gap:8px;margin-top:24px;max-width:400px;margin-left:auto;margin-right:auto}
.example-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;text-align:left;transition:all 0.2s}
.example-btn:hover{border-color:var(--accent);background:var(--bg4)}

/* Stats bar */
.stats-bar{background:var(--bg2);border-top:1px solid var(--border);padding:6px 20px;display:flex;gap:16px;font-size:11px;color:var(--text2);flex-shrink:0}
.stats-bar span{display:flex;align-items:center;gap:4px}

/* System message */
.sys-msg{text-align:center;color:var(--text2);font-size:12px;padding:4px 0;animation:fadeIn 0.3s}
.sys-msg.error{color:var(--red)}
</style>
</head>
<body>

<div class="header">
  <h1>🚀 AI Gateway Playground</h1>
  <span class="badge">LIVE</span>
  <div class="header-right">
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Model</label>
    <select id="modelSelect"><option>Loading...</option></select>
  </div>
  <div class="ctrl-group">
    <label>API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-gw-xxx" value="">
  </div>
  <div class="ctrl-group">
    <button class="toggle-btn active" id="streamToggle" onclick="toggleStream()">⚡ Stream</button>
    <button class="toggle-btn" id="systemToggle" onclick="toggleSystem()">💬 System</button>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <h2>Welcome to AI Gateway</h2>
    <p>Select a model, enter your API key, and start chatting. Supports streaming, multiple providers, and round-robin routing.</p>
    <div class="examples">
      <button class="example-btn" onclick="useExample(this)">💡 Explain how round-robin load balancing works</button>
      <button class="example-btn" onclick="useExample(this)">🐍 Write a Python function to merge two sorted arrays</button>
      <button class="example-btn" onclick="useExample(this)">🎨 Create a CSS animation for a loading spinner</button>
    </div>
  </div>
  <div class="typing" id="typing">
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="input-area">
  <div id="systemPromptBox" style="display:none;margin-bottom:10px">
    <textarea id="systemInput" rows="2" placeholder="System prompt (optional)..." style="min-height:36px;font-size:13px;background:var(--bg4)"></textarea>
  </div>
  <div class="input-row">
    <div class="input-wrapper">
      <textarea id="msgInput" placeholder="Type your message... (Shift+Enter for new line)" rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<div class="stats-bar">
  <span>📊 Messages: <strong id="statMsgs">0</strong></span>
  <span>🔤 Tokens: <strong id="statTokens">0</strong></span>
  <span>⏱ Latency: <strong id="statLatency">-</strong></span>
  <span>🤖 Provider: <strong id="statProvider">-</strong></span>
</div>

<script>
const HOST = '{{HOST}}';
const API_BASE = `http://${HOST}`;

let streaming = true;
let isGenerating = false;
let abortController = null;
let messages = [];
let totalTokens = 0;
let msgCount = 0;

// Auto-resize textarea
const msgInput = document.getElementById('msgInput');
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Load models on start
async function loadModels() {
  const sel = document.getElementById('modelSelect');
  const key = document.getElementById('apiKeyInput').value;
  try {
    const resp = await fetch(`${API_BASE}/v1/models`, {
      headers: { 'Authorization': `Bearer ${key}` }
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    sel.innerHTML = '';
    (data.data || []).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.id;
      sel.appendChild(opt);
    });
    setStatus(true);
  } catch (e) {
    sel.innerHTML = '<option>Failed to load models</option>';
    setStatus(false, e.message);
  }
}

function setStatus(ok, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot' + (ok ? ' connected' : '');
  txt.textContent = ok ? 'Connected' : (msg || 'Disconnected');
}

function toggleStream() {
  streaming = !streaming;
  document.getElementById('streamToggle').classList.toggle('active', streaming);
}

function toggleSystem() {
  const box = document.getElementById('systemPromptBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function useExample(btn) {
  msgInput.value = btn.textContent.replace(/^[^\s]+\s/, '');
  msgInput.focus();
  sendMessage();
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isGenerating) return;
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) {
    addSysMessage('Please enter an API key first', true);
    document.getElementById('apiKeyInput').focus();
    return;
  }

  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  msgInput.value = '';
  msgInput.style.height = 'auto';

  // Build request
  const model = document.getElementById('modelSelect').value;
  const systemPrompt = document.getElementById('systemInput').value.trim();

  const reqMessages = [];
  if (systemPrompt) reqMessages.push({ role: 'system', content: systemPrompt });
  reqMessages.push(...messages);

  const body = {
    model: model,
    messages: reqMessages,
    stream: streaming
  };

  isGenerating = true;
  updateSendBtn();
  showTyping(true);

  const startTime = Date.now();

  try {
    abortController = new AbortController();

    const resp = await fetch(`${API_BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify(body),
      signal: abortController.signal
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: { message: `HTTP ${resp.status}` } }));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }

    const latency = Date.now() - startTime;

    if (streaming) {
      await handleStream(resp, startTime);
    } else {
      const data = await resp.json();
      const content = data.choices?.[0]?.message?.content || '(empty response)';
      addMessage('assistant', content, {
        tokens: data.usage?.total_tokens,
        latency: Date.now() - startTime,
        model: data.model
      });
      messages.push({ role: 'assistant', content: content });
      if (data.usage) totalTokens += data.usage.total_tokens;
      document.getElementById('statProvider').textContent = data.model || '-';
    }

    document.getElementById('statLatency').textContent = latency + 'ms';
  } catch (e) {
    if (e.name === 'AbortError') {
      addSysMessage('Generation stopped');
    } else {
      addSysMessage('Error: ' + e.message, true);
    }
  } finally {
    isGenerating = false;
    abortController = null;
    updateSendBtn();
    showTyping(false);
    msgCount++;
    document.getElementById('statMsgs').textContent = msgCount;
  }
}

async function handleStream(resp, startTime) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullContent = '';
  let msgEl = null;
  let chunkCount = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || !trimmed.startsWith('data: ')) continue;
      const data = trimmed.slice(6);
      if (data === '[DONE]') break;

      try {
        const chunk = JSON.parse(data);
        const delta = chunk.choices?.[0]?.delta;
        if (!delta) continue;

        if (delta.role === 'assistant' && !msgEl) {
          // First chunk with role — create message
          msgEl = addMessage('assistant', '', { streaming: true });
          showTyping(false);
        }

        if (delta.content) {
          fullContent += delta.content;
          chunkCount++;
          if (msgEl) {
            updateStreamContent(msgEl, fullContent);
          }
          // Update token estimate
          document.getElementById('statTokens').textContent = '~' + Math.round(fullContent.length / 4);
        }

        if (chunk.model) {
          document.getElementById('statProvider').textContent = chunk.model;
        }
      } catch {}
    }
  }

  // Finalize
  if (msgEl) finalizeStream(msgEl, fullContent);
  messages.push({ role: 'assistant', content: fullContent });
  totalTokens += Math.round(fullContent.length / 4);
}

function addMessage(role, content, opts = {}) {
  const area = document.getElementById('chatArea');
  const typing = document.getElementById('typing');

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? 'U' : 'AI';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';
  if (typeof content === 'string') {
    contentEl.innerHTML = formatContent(content);
  }

  body.appendChild(contentEl);

  if (opts.tokens || opts.latency) {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const parts = [];
    if (opts.tokens) parts.push(`${opts.tokens} tokens`);
    if (opts.latency) parts.push(`${opts.latency}ms`);
    meta.textContent = parts.join(' · ');
    body.appendChild(meta);
  }

  msg.appendChild(avatar);
  msg.appendChild(body);

  area.insertBefore(msg, typing);
  scrollToBottom();

  return contentEl;
}

function updateStreamContent(el, content) {
  el.innerHTML = formatContent(content);
  scrollToBottom();
}

function finalizeStream(el, content) {
  el.innerHTML = formatContent(content);
}

function formatContent(text) {
  // Basic markdown-ish formatting
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function addSysMessage(text, isError = false) {
  const area = document.getElementById('chatArea');
  const typing = document.getElementById('typing');
  const el = document.createElement('div');
  el.className = 'sys-msg' + (isError ? ' error' : '');
  el.textContent = text;
  area.insertBefore(el, typing);
  scrollToBottom();
}

function showTyping(show) {
  document.getElementById('typing').classList.toggle('visible', show);
  if (show) scrollToBottom();
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  if (isGenerating) {
    btn.classList.add('stop-btn');
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
    btn.onclick = stopGeneration;
  } else {
    btn.classList.remove('stop-btn');
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
    btn.onclick = sendMessage;
  }
}

function stopGeneration() {
  if (abortController) abortController.abort();
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => area.scrollTop = area.scrollHeight);
}

// Init
loadModels();
msgInput.focus();
</script>
</body>
</html>
